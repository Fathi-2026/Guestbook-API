version: "3.9"

services:
  guestbook-db:
    image: postgres:15
    container_name: guestbook-db
    environment:
      POSTGRES_DB: guestbook
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - guestbook-net

  guestbook-api:
    build: .
    container_name: guestbook-api
    ports:
      - "3000:3000"
    depends_on:
      - guestbook-db
    networks:
      - guestbook-net

volumes:
  pgdata:

networks:
  guestbook-net: